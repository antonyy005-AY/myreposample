<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>🎉 Happy Birthday!</h1>
    <p id="mainMessage">Click below to see your birthday surprise.</p>

    <button id="surpriseBtn">Open Surprise</button>
    <button id="newMsgBtn">New Message</button>
  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <h2>🎂 Surprise!</h2>
      <p>Wishing you a day full of joy, laughter, and beautiful memories.</p>
      <button id="closePopup">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
